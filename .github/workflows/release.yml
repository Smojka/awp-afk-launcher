name: Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - "signed-v*"

permissions:
  contents: write

concurrency:
  group: signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-15
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build signed DMG
        run: npm run package:mac:signed

      - name: Verify signing
        run: npm run verify:release-signing

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunkkeeper-macos-dmg
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/*.dmg release/*.dmg.blockmap --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/*.dmg release/*.dmg.blockmap --title "ChunkKeeper $GITHUB_REF_NAME" --notes "Signed ChunkKeeper macOS release artifacts."
          fi

  windows:
    name: Windows NSIS
    runs-on: windows-latest
    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      WIN_CSC_SUBJECT_NAME: ${{ secrets.WIN_CSC_SUBJECT_NAME }}
      WIN_CSC_SHA1: ${{ secrets.WIN_CSC_SHA1 }}
      WIN_PUBLISHER_NAME: ${{ secrets.WIN_PUBLISHER_NAME }}
      WIN_TIMESTAMP_SERVER: ${{ secrets.WIN_TIMESTAMP_SERVER }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
      AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build signed installer
        run: npm run package:win:signed

      - name: Verify signing
        run: npm run verify:release-signing

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunkkeeper-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/*.exe release/*.exe.blockmap --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/*.exe release/*.exe.blockmap --title "ChunkKeeper $GITHUB_REF_NAME" --notes "Signed ChunkKeeper Windows release artifacts."
          fi
