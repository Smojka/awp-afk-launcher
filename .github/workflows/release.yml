name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          ChunkKeeper release build.

          ### What's new (v0.4.4)

          Fixed a crash that could take the whole app down. If you stopped a bot while it was
          still opening its connection, that socket was left unattended. About twenty seconds
          later the TCP connect timed out, and by then nothing on the bot was listening for the
          error, so Node rethrew it and Electron killed the process with the "A JavaScript error
          occurred in the main process" dialog. Teardown now keeps an error listener in place and
          aborts a socket that never finished connecting, so the timeout never fires at all.

          Uncaught exceptions and unhandled rejections in the main process are now written to the
          log instead of ending the session. A stray ECONNRESET or ETIMEDOUT arriving from a
          connection you already closed will not disconnect the bots that are still online.

          Updated to Mineflayer 4.37.1 with refreshed minecraft-data. Version presets now go up
          to 1.21.11.

          ### Included artifacts
          - ChunkKeeper native macOS ARM64 DMG
          - ChunkKeeper native Windows x64 NSIS installer
          - ChunkKeeper Web macOS ARM64 DMG
          - ChunkKeeper Web Windows x64 portable EXE
          - ChunkKeeper macOS first-run helper ZIP

          ### First launch on macOS

          macOS shows **"Apple could not verify 'ChunkKeeper' is free of malware"** with a
          *Move to Trash* button. This is the normal one-time Gatekeeper prompt for any free,
          un-notarized Mac app (notarization needs a paid Apple Developer ID) — not a real
          malware finding. The app is ad-hoc signed and runs fine once you clear it once.
          **Click `Done`, never `Move to Trash`.** Then use either method:

          **No Terminal:** drag ChunkKeeper to Applications and double-click it → `Done` →
          open **System Settings → Privacy & Security**, scroll to **Security**, and click
          **Open Anyway** next to "ChunkKeeper was blocked", then confirm with your password.

          **One Terminal command (most reliable):** after copying the app to Applications, run

          ```
          xattr -dr com.apple.quarantine "/Applications/ChunkKeeper.app"
          ```

          (use `"/Applications/ChunkKeeper Web.app"` for the web build), then open it normally.
          The bundled `ChunkKeeper-macOS-First-Run.zip` automates this; run it with
          `bash ~/Downloads/ChunkKeeper-macOS-First-Run.command`.

          ### Validation performed in CI
          - TypeScript typecheck
          - Vitest test suite
          - Production dependency audit
          - Native macOS and Windows packaging
          - Web-dashboard macOS and Windows portable packaging
          - macOS app signature and DMG verification

          ChunkKeeper is the native desktop app. ChunkKeeper Web starts the localhost browser dashboard without a Windows setup installer.
          NOTES

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "ChunkKeeper $TAG_NAME" --notes-file release-notes.md --latest
          else
            gh release create "$TAG_NAME" --title "ChunkKeeper $TAG_NAME" --notes-file release-notes.md --latest
          fi

  macos:
    name: macOS DMG
    runs-on: macos-15
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build native DMG
        run: npm run package:mac

      - name: Verify native macOS app signature
        run: codesign --verify --deep --strict --verbose=2 release/mac-arm64/ChunkKeeper.app

      - name: Verify update zip
        shell: bash
        run: |
          set -euo pipefail
          # Prove the artifact the macOS self-swap consumes: extract the arm64 update zip and
          # verify the bundle inside still passes codesign after ditto round-trips it.
          workdir="$(mktemp -d)"
          ditto -x -k release/ChunkKeeper-*-arm64.zip "$workdir"
          codesign --verify --deep --strict --verbose=2 "$workdir/ChunkKeeper.app"

      - name: Build web dashboard DMG
        run: npm run package:web:mac

      - name: Verify web dashboard macOS app signature
        run: codesign --verify --deep --strict --verbose=2 "release/mac-arm64/ChunkKeeper Web.app"

      - name: Create macOS first-run helper
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/macos-first-run.command release/ChunkKeeper-macOS-First-Run.command
          chmod +x release/ChunkKeeper-macOS-First-Run.command
          (cd release && ditto -c -k --keepParent ChunkKeeper-macOS-First-Run.command ChunkKeeper-macOS-First-Run.zip)

      - name: Verify macOS DMGs
        shell: bash
        run: |
          set -euo pipefail

          for dmg_path in release/*.dmg; do
            hdiutil verify "$dmg_path"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: chunkkeeper-macos-dmgs
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*-arm64.zip
            release/*.zip.blockmap
            release/latest-mac.yml
            release/ChunkKeeper-macOS-First-Run.zip
          if-no-files-found: error

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" release/*.dmg release/*.dmg.blockmap release/*-arm64.zip release/*.zip.blockmap release/latest-mac.yml release/ChunkKeeper-macOS-First-Run.zip --clobber

  windows:
    name: Windows EXE
    runs-on: windows-latest
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build native installer
        run: npm run package:win

      - name: Build web dashboard portable EXE
        run: npm run package:web:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: chunkkeeper-windows-exes
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" release/*.exe release/*.exe.blockmap release/latest.yml --clobber
