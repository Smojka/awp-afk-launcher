name: Unsigned Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-unsigned*"

permissions:
  contents: write

concurrency:
  group: unsigned-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create unsigned GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          Unsigned ChunkKeeper release.

          These artifacts are not code-signed or notarized. macOS Gatekeeper, Windows SmartScreen, or antivirus products may show warnings until a signed publisher identity is used.

          Included artifacts:
          - macOS ARM64 DMG
          - Windows x64 NSIS installer

          Validation performed in CI:
          - TypeScript typecheck
          - Vitest test suite
          - Production dependency audit
          - Local unsigned packaging
          NOTES

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "ChunkKeeper $TAG_NAME" --notes-file release-notes.md --prerelease
          else
            gh release create "$TAG_NAME" --title "ChunkKeeper $TAG_NAME" --notes-file release-notes.md --prerelease
          fi

  macos:
    name: macOS unsigned DMG
    runs-on: macos-15
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build unsigned DMG
        run: npm run package:mac

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunkkeeper-macos-unsigned-dmg
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" release/*.dmg release/*.dmg.blockmap --clobber

  windows:
    name: Windows unsigned NSIS
    runs-on: windows-latest
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --reporter=verbose

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build unsigned installer
        run: npm run package:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunkkeeper-windows-unsigned-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" release/*.exe release/*.exe.blockmap --clobber
